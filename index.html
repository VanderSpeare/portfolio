<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Phạm Đại Trí — Full-Stack Developer</title>
    <meta name="description" content="Portfolio of Phạm Đại Trí — full-stack web developer, HCMUNRE Information Technology." />
    <meta name="author"      content="Phạm Đại Trí" />
    <meta name="theme-color" content="#09090d" />

    <!-- Open Graph -->
    <meta property="og:title"       content="Phạm Đại Trí — Full-Stack Developer" />
    <meta property="og:description" content="Portfolio: full-stack apps, algorithms, layout systems." />
    <meta property="og:type"        content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to speed up Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts — static <link> so Vercel/Netlify caches it, not injected by JS -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;500;600&family=Noto+Serif+JP:wght@200;300;400&display=swap"
    />

    <!--
      Critical inline CSS:
      - Sets background BEFORE JS or external CSS loads → no white flash
      - Font-family fallback so text shows even if Google Fonts is slow
    -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html  { scroll-behavior: smooth; }
      body  {
        background: #09090d;
        color: #dcdcf0;
        min-height: 100vh;
        font-family: 'Be Vietnam Pro', 'Segoe UI', system-ui, sans-serif;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
